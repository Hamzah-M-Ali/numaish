<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join Numaish</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <section id="join-page">
    <div id="join-card">
      <h1>Join the Numaish Community</h1>

      <p>
        Join Numaish to discover artists, sell your work, and connect with the community.
      </p>

      <form id="join-form">
        <input 
          type="text"
          id="fullName"
          placeholder="Full Name"
          required
        >

        <input
          type="email"
          id="email"
          placeholder="Email Address" 
          required
        >
        <select id="user-type" required>

          <option value="">I am a...</option>
          <option value="artist">
            Artist
          </option>
        <option value="patron">
          Community Member
        </option>

        </select>
        <button type="submit" id="submit-btn">Join Now</button>
      </form>
      <div id="form-message"></div>

      <a href="index.html" id="back-home">← Back to Home</a>
    </div>
  </section>

  <script>
  document.getElementById("join-form").addEventListener("submit", async function(e) {

    e.preventDefault();

    const submitBtn = document.getElementById("submit-btn");
    const message = document.getElementById("form-message");

    submitBtn.disabled = true;
    submitBtn.textContent = "Submitting...";
    message.textContent = "";

    const data = {
      fullName: document.getElementById("fullName").value,
      email: document.getElementById("email").value,
      userType: document.getElementById("user-type").value
    };

    try {

      const response = await fetch("https://numaish-backend.onrender.com/api/join", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
      });

      const result = await response.json();

      if (response.ok) {

        message.textContent = "✓ Thank you for joining Numaish!";
        message.className = "success-message";

        document.getElementById("join-form").reset();

      } else {

        message.textContent = result.error;
        message.className = "error-message";
      }

    } catch (err) {

      console.error(err);

      message.textContent = "Could not connect to server.";
      message.className = "error-message";

    } finally {

      submitBtn.disabled = false;
      submitBtn.textContent = "Join Now";
    }
  });
  </script>
</body>
</html>
