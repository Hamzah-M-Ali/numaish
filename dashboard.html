<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css" rel="stylesheet">

  <title>My Account - Numaish</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header id="navbar">
  <div id="logo-container">
    <a href="index.html">
      <img src="media/logoN.png" alt="Numaish Logo" id="logo-image">
    </a>
  </div>

  <nav id="nav-links">
    <a href="discover.html"><b>Discover Artists</b></a>
    <a href="about.html"><b>About Us</b></a>
    <a href="contact.html"><b>Contact</b></a>
    <a href="dashboard.html" id="auth-link"><b>Account</b></a>
  </nav>
</header>

<section id="account-page">
  <div id="account-card">

    <h1>My Profile</h1>
    <p id="user-email">Loading...</p>

    <div id="profile-layout">

      <div id="profile-left">

        <div id="pfp-circle">
          <span id="pfp-placeholder">Profile Photo</span>
          <img id="pfp-preview" src="" alt="Profile picture" style="display:none;">
        </div>

        <input type="file" id="pfp-upload" accept="image/*">

        <button id="save-profile-button">Save Profile</button>
        <button id="logout-button">Log Out</button>

      </div>

      <div id="profile-right">

        <div class="profile-input-group">
          <label>Profile Name</label>
          <input id="profile-name" type="text" placeholder="Your name">
        </div>

        <div class="profile-input-group">
          <label>About Me</label>
          <textarea id="about-me" placeholder="Tell people about yourself, your art, and your story."></textarea>
        </div>

        <div class="profile-input-group">
          <label>Location</label>

          <div class="location-container">
            <input
              id="location"
              type="text"
              placeholder="Search for your city"
              autocomplete="off"
            >

            <div id="location-results"></div>
          </div>
        </div>

        <div class="profile-input-group">
          <label>Specialty</label>

          <select id="specialty">
            <option value="">Select your specialty</option>
            <option value="Block Printing">Block Printing</option>
            <option value="Calligraphy">Calligraphy</option>
            <option value="Jewelry">Jewelry</option>
            <option value="Language Art">Language Art</option>
            <option value="Mixed Media">Mixed Media</option>
            <option value="Painting">Painting</option>
            <option value="Photography">Photography</option>
            <option value="Pottery">Pottery</option>
            <option value="Sculpture">Sculpture</option>
            <option value="Textile Art">Textile Art</option>
            <option value="Wedding Decor">Wedding Decor</option>
            <option value="Woodwork">Woodwork</option>
          </select>
        </div>

        <div class="profile-input-group">
          <label>Artwork Showcase</label>

          <div id="artwork-grid">
            <div class="artwork-upload-box">
              <span>+ Add Artwork</span>
              <input type="file" id="artwork-upload" accept="image/*">
            </div>
          </div>
        </div>

        <p id="profile-message"></p>

      </div>

    </div>

  </div>
</section>

<div id="crop-modal" class="crop-modal">
  <div class="crop-content">

    <h2>Crop Profile Photo</h2>

    <div class="crop-image-wrapper">
      <img id="crop-image" src="" alt="Crop image">
    </div>

    <div class="crop-actions">
      <button id="cancel-crop" type="button">Cancel</button>
      <button id="confirm-crop" type="button">Use Photo</button>
    </div>

  </div>
</div>

<footer>
  <p>© 2026 Numaish. All rights reserved.</p>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>

<script type="module">
  import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

  const supabaseUrl = "https://oaqmbdfkkxzrznzsfzug.supabase.co";
  const supabaseAnonKey = "sb_publishable_nKY-APQwA4523dOvdBn3Jg_SGBUyMGo";
  const GEOAPIFY_API_KEY = "96c65a4245de4a9cbb1b41e3207210d9";

  const supabase = createClient(supabaseUrl, supabaseAnonKey);

  const {
    data: { session }
  } = await supabase.auth.getSession();

  if (!session) {
    window.location.href = "signin.html";
  }

  const user = session.user;

  const userEmail = document.getElementById("user-email");
  const profileName = document.getElementById("profile-name");
  const aboutMe = document.getElementById("about-me");
  const locationInput = document.getElementById("location");
  const locationResults = document.getElementById("location-results");
  const specialty = document.getElementById("specialty");

  const pfpUpload = document.getElementById("pfp-upload");
  const pfpPreview = document.getElementById("pfp-preview");
  const pfpPlaceholder = document.getElementById("pfp-placeholder");

  const cropModal = document.getElementById("crop-modal");
  const cropImage = document.getElementById("crop-image");
  const confirmCrop = document.getElementById("confirm-crop");
  const cancelCrop = document.getElementById("cancel-crop");

  const artworkGrid = document.getElementById("artwork-grid");
  const artworkUpload = document.getElementById("artwork-upload");

  const message = document.getElementById("profile-message");
  const saveButton = document.getElementById("save-profile-button");

  let locationTimeout;
  let cropper = null;
  let croppedPfpBlob = null;
  let currentPfpUrl = null;

  userEmail.textContent = `Signed in as ${user.email}`;

  async function loadProfile() {
    const { data, error } = await supabase
      .from("profiles")
      .select("*")
      .eq("id", user.id)
      .single();

    if (error && error.code !== "PGRST116") {
      message.textContent = error.message;
      message.className = "error-message";
      return;
    }

    if (data) {
      profileName.value = data.profile_name || "";
      aboutMe.value = data.about_me || "";
      locationInput.value = data.location || "";
      specialty.value = data.specialty || "";
      currentPfpUrl = data.pfp_url || null;

      if (data.pfp_url) {
        pfpPreview.src = data.pfp_url;
        pfpPreview.style.display = "block";
        pfpPlaceholder.style.display = "none";
      }
    }
  }

  async function loadArtwork() {
    const { data, error } = await supabase
      .from("artworks")
      .select("*")
      .eq("user_id", user.id)
      .order("created_at", { ascending: false });

    if (error) return;

    data.forEach((artwork) => {
      const artworkCard = document.createElement("div");

      artworkCard.className = "artwork-card";

      artworkCard.innerHTML = `
        <img src="${artwork.image_url}" alt="Artwork">
        <button class="delete-artwork-button" data-id="${artwork.id}">
          Delete
        </button>
      `;

      artworkGrid.appendChild(artworkCard);
    });
  }

  pfpUpload.addEventListener("change", () => {
    const file = pfpUpload.files[0];

    if (!file) return;

    const imageUrl = URL.createObjectURL(file);

    cropImage.src = imageUrl;
    cropModal.style.display = "flex";

    cropImage.onload = () => {
      if (cropper) {
        cropper.destroy();
      }

      cropper = new Cropper(cropImage, {
        aspectRatio: 1,
        viewMode: 0,
        dragMode: "move",
        autoCropArea: 0.85,
        responsive: true,
        zoomable: true,
        movable: true,
        cropBoxMovable: true,
        cropBoxResizable: true,
        scalable: true,
        rotatable: false,
        background: false,
        guides: true
      });
    };
  });

  confirmCrop.addEventListener("click", async () => {
    if (!cropper) return;

    const canvas = cropper.getCroppedCanvas({
      width: 500,
      height: 500
    });

    croppedPfpBlob = await new Promise((resolve) => {
      canvas.toBlob(resolve, "image/jpeg", 0.9);
    });

    pfpPreview.src = canvas.toDataURL("image/jpeg");
    pfpPreview.style.display = "block";
    pfpPlaceholder.style.display = "none";

    cropModal.style.display = "none";

    cropper.destroy();
    cropper = null;
  });

  cancelCrop.addEventListener("click", () => {
    cropModal.style.display = "none";
    pfpUpload.value = "";

    if (cropper) {
      cropper.destroy();
      cropper = null;
    }
  });

  artworkUpload.addEventListener("change", async () => {
    const file = artworkUpload.files[0];

    if (!file) return;

    message.textContent = "Uploading artwork...";

    const fileExt = file.name.split(".").pop();
    const filePath = `${user.id}/${Date.now()}.${fileExt}`;

    const { error: uploadError } = await supabase.storage
      .from("artwork-images")
      .upload(filePath, file);

    if (uploadError) {
      message.textContent = uploadError.message;
      message.className = "error-message";
      return;
    }

    const { data: publicUrlData } = supabase.storage
      .from("artwork-images")
      .getPublicUrl(filePath);

    const { error: insertError } = await supabase
      .from("artworks")
      .insert({
        user_id: user.id,
        image_url: publicUrlData.publicUrl
      });

    if (insertError) {
      message.textContent = insertError.message;
      message.className = "error-message";
      return;
    }

    location.reload();
  });

  artworkGrid.addEventListener("click", async (e) => {
    if (!e.target.classList.contains("delete-artwork-button")) return;

    await supabase
      .from("artworks")
      .delete()
      .eq("id", e.target.dataset.id);

    location.reload();
  });

  saveButton.addEventListener("click", async () => {
    saveButton.disabled = true;
    saveButton.textContent = "Saving...";

    let pfpUrl = currentPfpUrl;

    if (croppedPfpBlob) {
      const filePath = `${user.id}/profile.jpg`;

      const { error: uploadError } = await supabase.storage
        .from("profile-pictures")
        .upload(filePath, croppedPfpBlob, {
          upsert: true,
          contentType: "image/jpeg"
        });

      if (uploadError) {
        message.textContent = uploadError.message;
        message.className = "error-message";

        saveButton.disabled = false;
        saveButton.textContent = "Save Profile";

        return;
      }

      const { data: publicUrlData } = supabase.storage
        .from("profile-pictures")
        .getPublicUrl(filePath);

      pfpUrl = `${publicUrlData.publicUrl}?v=${Date.now()}`;
      currentPfpUrl = pfpUrl;
    }

    const { error } = await supabase
      .from("profiles")
      .upsert({
        id: user.id,
        email: user.email,
        profile_name: profileName.value,
        about_me: aboutMe.value,
        location: locationInput.value,
        specialty: specialty.value,
        pfp_url: pfpUrl,
        updated_at: new Date()
      });

    if (error) {
      message.textContent = error.message;
      message.className = "error-message";
    } else {
      message.textContent = "✓ Profile saved successfully!";
      message.className = "success-message";
      croppedPfpBlob = null;
    }

    saveButton.disabled = false;
    saveButton.textContent = "Save Profile";
  });

  document.getElementById("logout-button").addEventListener("click", async () => {
    await supabase.auth.signOut();
    window.location.href = "signin.html";
  });

  locationInput.addEventListener("input", () => {
    clearTimeout(locationTimeout);

    const query = locationInput.value.trim();

    if (query.length < 2) {
      locationResults.innerHTML = "";
      locationResults.style.display = "none";
      return;
    }

    locationTimeout = setTimeout(async () => {
      try {
        const response = await fetch(
          `https://api.geoapify.com/v1/geocode/autocomplete?text=${encodeURIComponent(query)}&type=city&limit=5&apiKey=${GEOAPIFY_API_KEY}`
        );

        const data = await response.json();

        locationResults.innerHTML = "";

        if (!data.features?.length) {
          locationResults.style.display = "none";
          return;
        }

        data.features.forEach((feature) => {
          const city = feature.properties.city;
          const state = feature.properties.state;
          const country = feature.properties.country;

          if (!city || !country) return;

          const locationText = state
            ? `${city}, ${state}, ${country}`
            : `${city}, ${country}`;

          const option = document.createElement("div");

          option.className = "location-option";
          option.textContent = locationText;

          option.addEventListener("click", () => {
            locationInput.value = locationText;
            locationResults.style.display = "none";
          });

          locationResults.appendChild(option);
        });

        locationResults.style.display = "block";

      } catch (error) {
        console.error(error);
      }
    }, 300);
  });

  document.addEventListener("click", (event) => {
    if (!event.target.closest(".location-container")) {
      locationResults.style.display = "none";
    }
  });

  await loadProfile();
  await loadArtwork();
</script>

</body>
</html>
