<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>My Account - Numaish</title>

  <link rel="stylesheet" href="style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

  <header id="navbar">

    <div id="logo-container">
      <a href="index.html">
        <img src="media/logoN.png" alt="Numaish Logo" id="logo-image">
      </a>
    </div>

    <nav id="nav-links">
      <a href="discover.html"><b>Discover Artists</b></a>
      <a href="about.html"><b>About Us</b></a>
      <a href="contact.html"><b>Contact</b></a>
      <a href="dashboard.html" id="auth-link"><b>Account</b></a>
    </nav>

  </header>

  <section id="signin-page">

    <div id="signin-card">

      <h1>My Account</h1>

      <p id="user-email">
        Loading...
      </p>

      <button id="logout-button">
        Log Out
      </button>

    </div>

  </section>

  <footer>
    <p>© 2026 Numaish. All rights reserved.</p>
  </footer>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const supabaseUrl = "https://oaqmbdfkkxzrznzsfzug.supabase.co";
    const supabaseAnonKey = "sb_publishable_nKY-APQwA4523dOvdBn3Jg_SGBUyMGo";

    const supabase = createClient(supabaseUrl, supabaseAnonKey);

    const {
      data: { session }
    } = await supabase.auth.getSession();

    if (!session) {
      window.location.href = "signin.html";
    }

    document.getElementById("user-email").textContent =
      `Signed in as ${session.user.email}`;

    document
      .getElementById("logout-button")
      .addEventListener("click", async () => {

        await supabase.auth.signOut();

        window.location.href = "signin.html";
      });
  </script>

</body>
</html>
