<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Sign In - Numaish</title>

  <link rel="stylesheet" href="style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <header id="navbar">

    <div id="logo-container">
        <a href="index.html">
        <img src="media/logoN.png" alt="Numaish Logo" id="logo-image">
        </a>
    </div>

    <nav id="nav-links">
        <a href="discover.html"><b>Discover Artists</b></a>
        <a href="about.html"><b>About Us</b></a>
        <a href="contact.html"><b>Contact</b></a>
        <a href="signin.html"><b>Sign in</b></a>
    </nav>

    </header>

  <section id="signin-page">

    <div id="signin-card">

      <h1>Welcome to Numaish</h1>

      <p>
        Sign in to your account or apply to join as an artist.
      </p>

      <div id="signin-tabs">

        <button class="active-tab">
          Sign In
        </button>

        <a href="join.html" id="signup-link">
          Sign Up
        </a>

      </div>

      <form id="signin-form">

        <div class="signin-input-group">
          <label>Email</label>

          <input
            type="email"
            placeholder="your@email.com"
          >
        </div>

        <div class="signin-input-group">
          <label>Password</label>

          <input
            type="password"
            placeholder="Enter your password"
          >
        </div>

        <button type="submit" id="signin-button">
          Sign In
        </button>

      </form>

    </div>

  </section>
  <footer>

    <p>
      © 2026 Numaish. All rights reserved.
    </p>

  </footer>
</body>
</html>
