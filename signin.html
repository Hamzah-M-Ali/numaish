<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Sign In - Numaish</title>

  <link rel="stylesheet" href="style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

  <header id="navbar">

    <div id="logo-container">
      <a href="index.html">
        <img src="media/logoN.png" alt="Numaish Logo" id="logo-image">
      </a>
    </div>

    <nav id="nav-links">
      <a href="discover.html"><b>Discover Artists</b></a>
      <a href="about.html"><b>About Us</b></a>
      <a href="contact.html"><b>Contact</b></a>
      <a href="signin.html" id="auth-link"><b>Sign in</b></a>
    </nav>

  </header>

  <section id="signin-page">

    <div id="signin-card">

      <h1>Welcome to Numaish</h1>

      <p>
        Sign in to your account to discover and connect with South Asian artists.
      </p>

      <div id="signin-tabs">

        <button class="active-tab">
          Sign In
        </button>

        <a href="signup.html" id="signup-link">
          Sign Up
        </a>

      </div>

      <form id="signin-form">

        <div class="signin-input-group">
          <label>Email</label>
          <input id="signin-email" type="email" placeholder="your@email.com" required>
        </div>

        <div class="signin-input-group">
          <label>Password</label>
          <input id="signin-password" type="password" placeholder="Enter your password" required>
        </div>

        <button type="submit" id="signin-button">
          Sign In
        </button>

      </form>

      <div id="signin-message"></div>

    </div>

  </section>

  <footer>
    <p>
      © 2026 Numaish. All rights reserved.
    </p>
  </footer>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const supabaseUrl = "https://oaqmbdfkkxzrznzsfzug.supabase.co";
    const supabaseAnonKey = "sb_publishable_nKY-APQwA4523dOvdBn3Jg_SGBUyMGo";

    const supabase = createClient(supabaseUrl, supabaseAnonKey);

    const { data: { session } } = await supabase.auth.getSession();

    const authLink = document.getElementById("auth-link");

    if (session) {
      authLink.innerHTML = "<b>Account</b>";
      authLink.href = "dashboard.html";
      window.location.href = "dashboard.html";
    }

    document.getElementById("signin-form").addEventListener("submit", async function(e) {
      e.preventDefault();

      const email = document.getElementById("signin-email").value;
      const password = document.getElementById("signin-password").value;
      const button = document.getElementById("signin-button");
      const message = document.getElementById("signin-message");

      button.disabled = true;
      button.textContent = "Signing in...";
      message.textContent = "";

      const { data, error } = await supabase.auth.signInWithPassword({
        email: email,
        password: password
      });

      if (error) {
        message.textContent = error.message;
        message.className = "error-message";

        button.disabled = false;
        button.textContent = "Sign In";
        return;
      }

      window.location.href = "dashboard.html";
    });
  </script>

</body>
</html>
